name: QRadar Rule Sync

on:
  push:
    paths:
      - 'rules/**'  # Yalnız rules qovluğunda dəyişiklik edəndə işə düşür

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          # GitHub bu dəyərləri sənin Settings-də yazdığın sandıqdan götürəcək
          QRADAR_IP: ${{ secrets.QRADAR_IP }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python scripts/sync.py
